name: Build Static Linux Binary

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Perform a clean build (ignore cache)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build Telegram Bot API (Linux Static)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache Build Objects
        if: ${{ github.event.inputs.clean_build != 'true' }}
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-tgbotapi-static-${{ hashFiles('**/*.cpp', '**/*.h', '**/CMakeLists.txt', '.github/workflows/build.yml') }}
          restore-keys: |
            ${{ runner.os }}-tgbotapi-static-

      - name: Build Static Binary (Alpine Docker)
        run: |
          # Create build and dist directories on host to ensure correct permissions
          mkdir -p build dist

          # Run compilation in Alpine container for fully static linking against musl-libc
          # We mount the workspace to the same path inside the container to preserve absolute paths in CMakeCache
          docker run --rm \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            alpine:3.20 \
            sh -c '
              set -e

              apk update
              apk add --no-cache \
                alpine-sdk \
                linux-headers \
                git \
                zlib-dev \
                zlib-static \
                openssl-dev \
                openssl-libs-static \
                gperf \
                cmake

              # Configure the build
              cd build
              cmake -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_EXE_LINKER_FLAGS="-static" \
                    -DCMAKE_FIND_LIBRARY_SUFFIXES=".a" \
                    -DOPENSSL_USE_STATIC_LIBS=TRUE \
                    -DZLIB_USE_STATIC_LIBS=TRUE \
                    -DBUILD_SHARED_LIBS=OFF \
                    -DCMAKE_INSTALL_PREFIX:PATH=${{ github.workspace }}/dist \
                    ..

              # Build and Install
              cmake --build . --target install -j$(nproc)

              # Strip debugging symbols from the final binary
              strip ${{ github.workspace }}/dist/bin/telegram-bot-api

              # Fix permissions so that host can access/cache/clean up these directories
              chown -R "$(stat -c "%u:%g" ${{ github.workspace }})" ${{ github.workspace }}/build ${{ github.workspace }}/dist
            '

      - name: Verify Binary
        run: |
          file dist/bin/telegram-bot-api
          # Ensure it is indeed statically linked
          if ldd dist/bin/telegram-bot-api 2>&1 | grep -q "not a dynamic executable"; then
            echo "Success: Binary is statically linked!"
          else
            # On some systems, ldd outputs "statically linked" or fails. Let's make sure it is not dynamic.
            if ! file dist/bin/telegram-bot-api | grep -q "statically linked"; then
              echo "Error: Binary is dynamically linked!"
              exit 1
            fi
            echo "Success: Binary is statically linked (verified via file)!"
          fi

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-bot-api-linux-x86_64
          path: dist/bin/telegram-bot-api
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/bin/telegram-bot-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
